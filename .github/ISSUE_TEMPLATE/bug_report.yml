name: Bug report
description: Report a reproducible problem in AeroTravel.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include exact inputs, city names, dates, transport mode, and browser/server context.
      placeholder: |
        1. Start server with ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include request IDs, console errors, or API responses when available.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
      placeholder: v1.1.0 or commit SHA
