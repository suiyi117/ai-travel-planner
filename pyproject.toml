[tool.ruff]
target-version = "py310"
line-length = 120
extend-exclude = [
  ".conda",
  ".od-skills",
  "services/.cache",
]

[tool.ruff.lint]
select = ["E9", "F821"]
ignore = [
  "E501",
  "B008",
]

[tool.mypy]
python_version = "3.10"
warn_unused_configs = true
ignore_missing_imports = true
check_untyped_defs = false
disallow_untyped_defs = false
no_implicit_optional = false
exclude = [
  "^services/\\.cache/",
]

[tool.coverage.run]
branch = true
source = [
  "clients",
  "core",
  "planner",
  "routers",
  "schemas",
  "services",
]
omit = [
  "*/__init__.py",
]

[tool.coverage.report]
fail_under = 50
show_missing = true
skip_covered = true
exclude_lines = [
  "pragma: no cover",
  "if __name__ == .__main__.:",
]
